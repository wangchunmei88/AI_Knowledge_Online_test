<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI 知识库 · 在线学习地图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f6f9fc;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 2rem 1rem;
            color: #1a3e50;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #1f6e8c, #2e8a99);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header p {
            color: #5b8c9e;
            margin-top: 0.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }
        .card {
            background: white;
            border-radius: 1.2rem;
            padding: 1.2rem 1.2rem;
            transition: 0.2s;
            border: 1px solid #dce9f0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #9bc4d0;
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.08);
        }
        .card a {
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            color: #1f6e8c;
            display: block;
            margin-bottom: 0.3rem;
        }
        .card a:hover {
            color: #0f4b5e;
            text-decoration: underline;
        }
        .card .file-name {
            font-size: 0.75rem;
            color: #7fa1b0;
            word-break: break-all;
        }
        .footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #8aaebd;
            border-top: 1px solid #e2edf2;
            padding-top: 1.2rem;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #2e8a99;
        }
        @media (max-width: 650px) {
            .grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧠 AI 算法学习地图</h1>
        <p>点击卡片直达相应笔记 · 持续更新中</p>
    </div>
    <div id="fileList" class="grid">
        <div class="loading">📚 正在加载学习目录...</div>
    </div>
    <div class="footer">
        📌 本页面自动列出仓库中所有 .html 文件 | 由 GitHub Pages 托管
    </div>
</div>

<script>
    // 获取当前仓库的根路径（GitHub Pages 子目录）
    const basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
    const repoFullName = window.location.pathname.split('/')[1] + '/' + window.location.pathname.split('/')[2];

    // 使用 GitHub API 获取当前仓库根目录下的所有文件
    const apiUrl = `https://api.github.com/repos/wangchunmei88/AI_Knowledge_Online_test/contents/`;

    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            if (Array.isArray(data)) {
                const htmlFiles = data.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');
                const container = document.getElementById('fileList');
                if (htmlFiles.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#888;">✨ 暂时还没有找到笔记，稍后回来～</div>';
                    return;
                }
                // 排序：按文件名升序
                htmlFiles.sort((a,b) => a.name.localeCompare(b.name));
                let html = '';
                htmlFiles.forEach(file => {
                    const fileName = file.name;
                    const displayName = fileName.replace('.html', '').replace(/_/g, ' ');
                    html += `
                        <div class="card">
                            <a href="${basePath}${encodeURIComponent(fileName)}">📘 ${escapeHtml(displayName)}</a>
                            <div class="file-name">${escapeHtml(fileName)}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } else {
                throw new Error('API 返回格式异常');
            }
        })
        .catch(err => {
            console.error('获取文件列表失败', err);
            document.getElementById('fileList').innerHTML = '<div style="text-align:center; color:#c55a5a;">⚠️ 无法自动加载目录，请刷新重试或检查网络。</div>';
        });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
