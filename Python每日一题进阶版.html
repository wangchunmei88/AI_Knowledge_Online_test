    const questions = [
        { text: "关于装饰器，以下说法正确的是？", code: "", options: ["A) 装饰器本质是函数，接收函数返回函数", "B) 装饰器只能作用于函数，不能作用于类", "C) 带参数的装饰器必须返回三层嵌套函数", "D) 装饰器在函数定义时执行，而不是调用时"], answer: "A", explanation: "装饰器本质是可调用对象，接收函数并返回新函数。可以作用于类方法，带参数的装饰器通常返回二层嵌套（外层接收参数，内层接收函数）。装饰器在定义时执行（编译时）。" },
        { text: "下面代码输出什么？", code: "def deco(func):\n    print('deco run')\n    return func\n@deco\ndef test():\n    print('test call')\ntest()", options: ["A) deco run\\ntest call", "B) test call", "C) deco run", "D) 报错"], answer: "A", explanation: "装饰器在函数定义时立即执行，打印 'deco run'；调用 test() 时执行函数体。" },
        { text: "关于生成器，说法错误的是？", code: "", options: ["A) 生成器函数使用 yield 返回值", "B) 生成器只能迭代一次", "C) 生成器可以接收 send() 发送的值", "D) 生成器是迭代器，但迭代器不一定是生成器"], answer: "B", explanation: "生成器可以迭代多次（每次重新创建生成器对象），但同一个生成器对象只能迭代一次。" },
        { text: "以下代码输出？", code: "def gen():\n    yield 1\n    yield 2\ng = gen()\nprint(next(g))\nprint(next(g))", options: ["A) 1\\n2", "B) 1", "C) 2", "D) 报错"], answer: "A", explanation: "每次调用 next() 执行到下一个 yield。" },
        { text: "关于上下文管理器，正确是？", code: "", options: ["A) 实现 __enter__ 和 __exit__ 方法即可", "B) 只能通过 with 语句使用", "C) contextlib.contextmanager 装饰器用于简化", "D) 以上都对"], answer: "D", explanation: "实现 __enter__/__exit__ 或使用 contextmanager 装饰器，搭配 with 语句使用。" },
        { text: "下面代码输出？", code: "class Ctx:\n    def __enter__(self):\n        print('enter')\n        return self\n    def __exit__(self, *args):\n        print('exit')\nwith Ctx() as c:\n    print('inside')", options: ["A) enter\\ninside\\nexit", "B) inside\\nenter\\nexit", "C) enter\\nexit\\ninside", "D) 报错"], answer: "A", explanation: "with 进入时调用 __enter__，执行代码块，退出时调用 __exit__。" },
        { text: "关于多线程，GIL 的说法正确的是？", code: "", options: ["A) GIL 确保 Python 线程安全", "B) GIL 使得 CPU 密集型任务多线程无法利用多核", "C) GIL 只在 CPython 中存在", "D) 以上都对"], answer: "D", explanation: "GIL 是 CPython 的全局锁，防止多个线程同时执行 Python 字节码，导致 CPU 密集型任务多线程效率低。但 I/O 密集型任务仍然有效。" },
        { text: "下面代码输出什么？", code: "from threading import Thread\ndef f():\n    print('ok')\nt = Thread(target=f)\nt.start()", options: ["A) ok", "B) 无输出", "C) 报错", "D) 线程无法启动"], answer: "A", explanation: "线程正常启动并执行函数，输出 'ok'。" },
        { text: "关于 multiprocessing 和 threading，说法正确的是？", code: "", options: ["A) multiprocessing 用于进程，threading 用于线程", "B) 多进程可以利用多核 CPU", "C) 多线程更轻量，但受 GIL 限制", "D) 以上都对"], answer: "D", explanation: "进程有独立内存空间，可以绕过 GIL 利用多核；线程更轻量但受 GIL 限制。" },
        { text: "下面代码输出什么？", code: "from concurrent.futures import ThreadPoolExecutor\ndef func():\n    return 1+1\nwith ThreadPoolExecutor() as ex:\n    f = ex.submit(func)\n    print(f.result())", options: ["A) 2", "B) None", "C) 报错", "D) <Future>"], answer: "A", explanation: "submit 返回 Future 对象，调用 result() 阻塞获取结果。" },
        { text: "关于 asyncio，说法错误的是？", code: "", options: ["A) asyncio 使用 async/await 语法", "B) asyncio 是协程，比线程更轻量", "C) asyncio 可以充分利用多核 CPU", "D) asyncio 适合 I/O 密集型任务"], answer: "C", explanation: "asyncio 是单线程事件循环，不能利用多核（需搭配多进程）。" },
        { text: "下面代码输出？", code: "import asyncio\nasync def main():\n    print('start')\n    await asyncio.sleep(0)\n    print('end')\nasyncio.run(main())", options: ["A) start\\nend", "B) end\\nstart", "C) start", "D) 报错"], answer: "A", explanation: "async 函数内 await 挂起事件循环，sleep(0) 让出控制权，但很快恢复。" },
        { text: "关于元类，正确的是？", code: "", options: ["A) 元类是类的类，type 是内置元类", "B) 使用 metaclass 关键字指定元类", "C) 元类可以控制类的创建过程", "D) 以上都对"], answer: "D", explanation: "元类用于创建类，可以拦截类定义，常见的 __new__ 和 __init__ 在元类中重写。" },
        { text: "下面代码输出？", code: "class Meta(type):\n    def __new__(cls, name, bases, dct):\n        dct['x'] = 10\n        return super().__new__(cls, name, bases, dct)\nclass A(metaclass=Meta):\n    pass\nprint(A.x)", options: ["A) 10", "B) 报错", "C) None", "D) 0"], answer: "A", explanation: "元类在创建类时向字典中添加属性 x。" },
        { text: "关于 __slots__ 的说法正确的是？", code: "", options: ["A) __slots__ 可以限制实例属性", "B) __slots__ 能减少内存占用", "C) __slots__ 会阻止 __dict__ 的创建", "D) 以上都对"], answer: "D", explanation: "__slots__ 声明允许的属性，避免每个实例拥有 __dict__，从而节省内存。" },
        { text: "下面代码输出？", code: "class A:\n    __slots__ = ('x',)\n    def __init__(self):\n        self.x = 1\n        self.y = 2\na = A()", options: ["A) 正常", "B) AttributeError: 'A' object has no attribute 'y'", "C) TypeError", "D) NameError"], answer: "B", explanation: "__slots__ 限制了实例属性，不能添加未声明的属性 y。" },
        { text: "关于闭包，下列说法正确的是？", code: "", options: ["A) 闭包必须返回函数", "B) 闭包可以访问外部函数的局部变量", "C) 闭包中修改外部变量需要使用 nonlocal", "D) 以上都对"], answer: "D", explanation: "闭包是指引用了外部函数变量的内部函数，修改外部变量需要 nonlocal 声明。" },
        { text: "下面代码输出？", code: "def outer(x):\n    def inner(y):\n        return x+y\n    return inner\nf = outer(5)\nprint(f(3))", options: ["A) 8", "B) 5", "C) 3", "D) 报错"], answer: "A", explanation: "闭包捕获了 x=5，inner 返回 5+3=8。" },
        { text: "关于 functools.wraps 的作用是？", code: "", options: ["A) 保留被装饰函数的元信息", "B) 将原函数的属性复制到包装函数", "C) 避免装饰器导致函数签名丢失", "D) 以上都对"], answer: "D", explanation: "wraps 用于修正装饰器，使装饰后的函数保留原名称、文档等。" },
        { text: "下面代码输出？", code: "from functools import wraps\ndef deco(func):\n    @wraps(func)\n    def wrapper(*args, **kwargs):\n        return func(*args, **kwargs)\n    return wrapper\n@deco\ndef test():\n    'doc'\nprint(test.__name__)", options: ["A) test", "B) wrapper", "C) deco", "D) None"], answer: "A", explanation: "wraps 将原函数名称复制给 wrapper，所以 __name__ 仍是 'test'。" }
    ];

    const extra = [
        { text: "关于 property 的描述错误的是？", code: "", options: ["A) property 可以将方法当作属性访问", "B) 可以定义 setter 和 deleter", "C) 只能用于实例属性，不能用于类属性", "D) 可以使用 @property 装饰器"], answer: "C", explanation: "property 可以用于类属性（通常通过元类或描述符）。" },
        { text: "下面代码输出？", code: "class C:\n    @property\n    def x(self):\n        return 1\n    @x.setter\n    def x(self, val):\n        self._x = val\nc = C()\nprint(c.x)\nc.x = 10\nprint(c._x)", options: ["A) 1\\n10", "B) 1\\n报错", "C) 报错", "D) None\\n10"], answer: "A", explanation: "getter 返回 1，setter 设置 _x。" },
        { text: "关于 weakref 模块，说法正确的是？", code: "", options: ["A) 弱引用不增加引用计数", "B) 可用于缓存，防止对象无法被回收", "C) 常用于处理循环引用", "D) 以上都对"], answer: "D", explanation: "weakref 创建弱引用，不影响垃圾回收。" },

        { text: "下面代码输出？", code: "for i, v in enumerate('ab', start=1):\n    print(i,v, end=' ')", options: ["A) 1 a 2 b", "B) 0 a 1 b", "C) a b", "D) 报错"], answer: "A", explanation: "enumerate 指定 start=1。" },
        { text: "关于 all 和 any，说法错误的是？", code: "", options: ["A) all 所有元素为真返回 True", "B) any 任一元素为真返回 True", "C) 空可迭代对象 all 返回 True", "D) 空可迭代对象 any 返回 True"], answer: "D", explanation: "any([]) 返回 False。" },
        { text: "下面代码输出？", code: "print(all([1,2,0]), any([0,False]))", options: ["A) False False", "B) True False", "C) False True", "D) True True"], answer: "A", explanation: "0 假值，all 假；any 无真值，假。" },
        { text: "关于 map 和 filter，说法正确的是？", code: "", options: ["A) map 对每个元素应用函数", "B) filter 根据条件筛选", "C) 返回迭代器", "D) 以上都对"], answer: "D", explanation: "map/filter 返回惰性对象。" }
    ];
    let all = [...questions, ...extra, ...more];
    // 确保正好50题
    all = all.slice(0,50);
    // 添加序号51-100
    const container = document.getElementById('questions-container');
    all.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        const qNum = idx + 51;
        let codeHtml = '';
        if (q.code && q.code.trim() !== '') {
            codeHtml = `<div class="code-block">${q.code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
        }
        card.innerHTML = `
            <div class="question-text">${qNum}. ${q.text}</div>
            ${codeHtml}
            <div class="options">
                ${q.options.map(opt => `<div class="option">${opt}</div>`).join('')}
            </div>
            <button class="btn-reveal" data-idx="${idx}">📖 查看答案</button>
            <div class="answer" id="answer-${idx}">
                <strong>正确答案：${q.answer}</strong><br>
                📘 解析：${q.explanation}
            </div>
        `;
        container.appendChild(card);
    });
    const buttons = document.querySelectorAll('.btn-reveal');
    buttons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const idx = btn.getAttribute('data-idx');
            const ansDiv = document.getElementById(`answer-${idx}`);
            ansDiv.classList.toggle('show');
            btn.textContent = ansDiv.classList.contains('show') ? '🙈 隐藏答案' : '📖 查看答案';
        });
    });
    document.getElementById('revealAll').addEventListener('click', () => {
        for(let i=0;i<50;i++) {
            const ansDiv = document.getElementById(`answer-${i}`);
            if(ansDiv && !ansDiv.classList.contains('show')) {
                ansDiv.classList.add('show');
                const btn = document.querySelector(`.btn-reveal[data-idx="${i}"]`);
                if(btn) btn.textContent = '🙈 隐藏答案';
            }
        }
    });
</script>
</body>
</html>
